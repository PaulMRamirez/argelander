<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>argelander demo: live SGP4 footprints</title>
<link rel="stylesheet" href="./main.css">
<style>
:root{--bg:#0C131C;--panel:#121B27;--txt:#D7E1EA;--dim:#8CA0B3;--teal:#7FD8CC;--line:#22303F}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{display:flex;flex-direction:column}
header{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:8px 14px;
background:var(--panel);border-bottom:1px solid var(--line);flex:none}
header h1{font:600 15px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--teal);margin:0 8px 0 0}
header a{color:var(--teal);text-decoration:none;font-size:12px}
select,button{background:var(--bg);color:var(--txt);border:1px solid var(--line);
border-radius:6px;padding:4px 8px;font:inherit}
#clock{font-family:ui-monospace,monospace;color:var(--teal);min-width:110px}
#status{color:var(--dim);font-size:12px}
#map{flex:1;min-height:0;background:#0C131C}
.leaflet-container{background:#0C131C}
/* The atlas palette is designed for a dark ground: darken the OSM tiles so
   teal, cyan, and amber read the way the atlas reads. */
.leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) saturate(0.5) brightness(0.85) contrast(0.9)}
.leaflet-control-attribution{background:rgba(18,27,39,0.85);color:#8CA0B3}
.leaflet-control-attribution a{color:#7FD8CC}
#legend{position:absolute;bottom:26px;left:10px;z-index:1000;display:flex;gap:12px;
padding:6px 10px;background:rgba(18,27,39,0.88);border:1px solid var(--line);
border-radius:8px;font-size:12px;color:var(--dim)}
#legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
</style>
</head>
<body>
<header>
  <h1>argelander demo</h1>
  <label>treatment <select id="treatment"></select></label>
  <label>speed <select id="speed">
    <option value="10">10x</option>
    <option value="60" selected>60x</option>
    <option value="300">300x</option>
  </select></label>
  <button id="pause">pause</button>
  <span id="clock">pass + 00:00</span>
  <span id="status">loading...</span>
  <a href="../index.html">docs</a>
  <a href="../atlas/index.html">atlas</a>
</header>
<div id="map"></div>
<div id="legend">
  <span><i style="background:#4FAEBC"></i>committed</span>
  <span><i style="background:#66DBF8"></i>acquiring / now</span>
  <span><i style="background:#F0B255"></i>planned</span>
</div>
<script src="./main.js"></script>
</body>
</html>
