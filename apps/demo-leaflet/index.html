<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>argelander demo: live SGP4 footprints</title>
<link rel="stylesheet" href="./main.css">
<style>
:root{--bg:#0C131C;--panel:#121B27;--txt:#D7E1EA;--dim:#8CA0B3;--teal:#7FD8CC;--line:#22303F}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{display:flex;flex-direction:column}
header{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:8px 14px;
background:var(--panel);border-bottom:1px solid var(--line);flex:none}
header h1{font:600 15px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--teal);margin:0 8px 0 0}
header a{color:var(--teal);text-decoration:none;font-size:12px}
select,button{background:var(--bg);color:var(--txt);border:1px solid var(--line);
border-radius:6px;padding:4px 8px;font:inherit}
#clock{font-family:ui-monospace,monospace;color:var(--teal);min-width:110px}
#status{color:var(--dim);font-size:12px}
/* The container background must match each basemap's ocean tone: translucent
   strip fills composite over it wherever tiles are missing or still loading,
   and a mismatched ground shows as a hard seam through the fills. */
#stage{flex:1;min-height:0;position:relative}
#map{position:absolute;inset:0}
#status{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:480px){header a{display:none}}
/* Layer config panel: satellites over instruments, config-as-data (AGE-12). */
#panel{position:absolute;top:10px;right:10px;width:280px;max-height:calc(100% - 20px);
display:none;flex-direction:column;background:rgba(18,27,39,0.92);
border:1px solid var(--line);border-radius:10px;z-index:1000;font-size:12.5px;overflow:hidden}
#panel.open{display:flex}
.panel-head{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);
font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--teal);font-size:12px}
.panel-head .count{flex:1}
.panel-head button{background:none;border:none;color:var(--dim);cursor:pointer;font:inherit;padding:2px 4px}
.panel-head button:hover{color:var(--teal)}
.panel-tree{overflow-y:auto;flex:1;padding:4px 0;scrollbar-width:thin}
.p-row{display:flex;align-items:center;gap:7px;padding:4px 10px;min-height:28px;cursor:pointer}
.p-row:hover{background:rgba(127,216,204,0.06)}
.p-row.sat{font-family:ui-monospace,monospace;font-size:11.5px;letter-spacing:.02em}
.p-row.instr{padding-left:26px}
.p-row .lbl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-row .sub{display:block;color:var(--dim);font-size:11px}
.p-row.off .lbl{color:var(--dim)}
.p-row canvas{flex:none}
.p-row .chev{color:var(--dim);width:12px;text-align:center;flex:none}
.p-row .n{color:var(--dim);font-size:10.5px}
.t-badge{color:var(--teal);font-family:ui-monospace,monospace;font-size:10px;border:1px solid var(--line);
border-radius:4px;padding:0 3px;flex:none}
.only-btn{background:none;border:none;color:var(--dim);font-size:10.5px;cursor:pointer;padding:1px 4px;
opacity:0;flex:none}
.p-row:hover .only-btn{opacity:1}
@media(hover:none){.only-btn{opacity:1}}
.only-btn:hover{color:var(--teal)}
.detail-row{display:flex;align-items:center;gap:8px;padding:4px 10px 6px 40px;color:var(--dim);font-size:11.5px}
.detail-row select{background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:5px;
padding:2px 5px;font-size:11.5px}
.panel-foot{border-top:1px solid var(--line);padding:8px 10px;display:flex;flex-direction:column;gap:7px}
.foot-line{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:11px}
.foot-line .cap{width:74px;flex:none}
.seg{display:flex;gap:2px;flex:1}
.seg button{flex:1;background:var(--bg);color:var(--dim);border:1px solid var(--line);padding:3px 0;
font-size:11px;cursor:pointer}
.seg button:first-child{border-radius:6px 0 0 6px}
.seg button:last-child{border-radius:0 6px 6px 0}
.seg button.on{background:var(--teal);color:#0C131C;border-color:var(--teal)}
.copy-btn{background:var(--bg);color:var(--dim);border:1px solid var(--line);border-radius:6px;
padding:4px 0;font-size:11px;cursor:pointer}
.copy-btn:hover{color:var(--teal)}
#panel-pill{position:absolute;bottom:26px;right:10px;z-index:1000;background:rgba(18,27,39,0.92);
color:var(--teal);border:1px solid var(--teal);border-radius:20px;padding:8px 14px;font:12px ui-monospace,monospace;
cursor:pointer}
@media(max-width:640px){
  #panel{top:auto;left:0;right:0;bottom:0;width:auto;max-height:50vh;border-radius:12px 12px 0 0;border-bottom:none}
  .p-row{min-height:44px}
  .detail-row{padding-left:26px}
  #stage.sheet-open #legend{display:none}
}
.leaflet-container{background:#aad3df}
.leaflet-container.dark-tiles{background:#2d3e48}
/* The atlas palette is designed for a dark ground: the Dark basemap darkens
   the OSM tiles so teal, cyan, and amber read the way the atlas reads. */
.dark-tiles .leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) saturate(0.5) brightness(0.85) contrast(0.9)}
.leaflet-control-attribution{background:rgba(18,27,39,0.85);color:#8CA0B3}
.leaflet-control-attribution a{color:#7FD8CC}
#legend{position:absolute;bottom:24px;left:10px;z-index:1000;display:flex;align-items:center;gap:10px;
padding:5px 9px;background:rgba(18,27,39,0.92);border:1px solid var(--line);
border-radius:16px;font-size:11.5px;color:var(--txt)}
#legend .cap{font:10px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--teal);letter-spacing:.08em}
#legend .items{display:flex;gap:12px;align-items:center}
#legend.min .items,#legend.min .cap{display:none}
#legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
#legend i.committed{background:rgba(79,174,188,0.45);border:1px solid #4FAEBC}
#legend i.now{background:#66DBF8;border-radius:50%;box-shadow:0 0 7px 2px rgba(102,219,248,0.6)}
#legend i.planned{background:rgba(240,178,85,0.45);border:1px solid #F0B255}
#legend-toggle{background:none;border:none;color:var(--dim);cursor:pointer;font:10.5px ui-monospace,monospace;padding:0 2px}
#legend-toggle:hover{color:var(--teal)}
#legend.min{padding:5px 9px}
/* The OSM credit is a license obligation and stays; it just stops shouting. */
.leaflet-control-attribution{font-size:9.5px;padding:1px 5px;opacity:0.75}
</style>
</head>
<body>
<header>
  <h1>argelander demo</h1>
  <label>treatment <select id="treatment"></select></label>
  <label>speed <select id="speed">
    <option value="10">10x</option>
    <option value="60" selected>60x</option>
    <option value="300">300x</option>
  </select></label>
  <button id="pause">pause</button>
  <span id="clock">pass + 00:00</span>
  <span id="status">loading...</span>
  <a href="../index.html">docs</a>
  <a href="../atlas/index.html">atlas</a>
</header>
<div id="stage">
  <div id="map"></div>
  <div id="legend">
    <span class="cap">STATE</span>
    <span class="items">
      <span><i class="committed"></i>committed</span>
      <span><i class="now"></i>acquiring / now</span>
      <span><i class="planned"></i>planned</span>
    </span>
    <button id="legend-toggle" title="show or hide the state key">hide</button>
  </div>
  <div id="panel"></div>
  <button id="panel-pill" hidden>satellites</button>
</div>
<script src="./main.js"></script>
</body>
</html>
